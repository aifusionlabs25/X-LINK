# X-LINK HUB v3 — Tool Registry
# Maps tool keys to modules, schemas, and runtime dependencies.

tools:
  direct_line:
    module: tools.direct_line.tool
    class: DirectLineTool
    description: Freeform conversational command lane to Hermes
    runtime_deps: [ollama]
    artifact_path: vault/sessions/
    inputs:
      message:
        type: string
        required: true

  usage_auditor:
    module: tools.usage_auditor.tool
    class: UsageAuditorTool
    description: Inspect usage/billing across platform targets
    runtime_deps: [browser]
    artifact_path: vault/reports/
    config_file: config/usage_targets.yaml
    inputs:
      targets:
        type: list
        required: false
        description: Optional subset of platform targets to audit

  xagent_eval:
    module: tools.xagent_eval.tool
    class: XAgentEvalTool
    description: Automated X Agent test sessions, scoring, and review packets
    runtime_deps: [browser]
    artifact_path: vault/evals/runs/
    config_file: config/scoring_rubrics.yaml
    inputs:
      target_agent:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: production
      scenario_pack:
        type: string
        required: false
        default: default
      difficulty:
        type: string
        required: false
        enum: [easy, medium, hard]
        default: medium
      runs:
        type: integer
        required: false
        default: 3
      transcript_mode:
        type: string
        required: false
        enum: [full, summary]
        default: full
      scoring_rubric:
        type: string
        required: false
        default: default

  briefing:
    module: tools.briefing.tool
    class: BriefingTool
    description: Transform tool outputs into executive summaries
    runtime_deps: [ollama]
    artifact_path: vault/reports/
    inputs:
      source_tools:
        type: list
        required: false
        description: Tools whose outputs to summarize
      format:
        type: string
        required: false
        enum: [email, markdown, json]
        default: markdown

  system_scout:
    module: tools.scout.tool
    class: SystemScoutTool
    description: Gives Hermes the ability to see his project environment, inspect files, and check hardware telemetry.
    runtime_deps: [python]
    artifact_path: vault/scout/
    inputs:
      action:
        type: string
        required: true
        enum: [ls, cat, grep, stats]
      params:
        type: dict
        required: false

  research:
    module: tools.research.tool
    class: MultiModelResearchTool
    description: Allows Hermes to research topics online via API or existing CDP browser tabs, and compact the results.
    runtime_deps: [python, playwright]
    artifact_path: vault/research/
    inputs:
      query:
        type: string
        required: true
      mode:
        type: string
        required: false
        enum: [api, cdp_browser]
        default: api

  architect:
    module: tools.architect.tool
    class: PromptArchitectTool
    description: Allows Hermes to surgically patch agents.yaml with built-in YAML safety linting.
    runtime_deps: [python]
    artifact_path: vault/architect/
    inputs:
      agent_slug:
        type: string
        required: true
      target_field:
        type: string
        required: false
        default: persona
      new_content:
        type: string
        required: true
