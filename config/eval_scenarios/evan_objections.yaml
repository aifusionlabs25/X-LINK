pack_name: evan_objections
version: "1.0"
description: Objection and pressure scenarios for Evan at Mullins Moving

scenarios:
  - scenario_id: "EVAN_PRICE_PUSHBACK"
    title: "Price Pressure - Cheap Mover Comparison"
    role: "prospect"
    difficulty: "hard"
    user_profile:
      name: "Derrick"
      archetype: "moving_customer"
      context: "Collected a lower quote from a budget mover and wants Evan to defend Mullins on price alone."
    opening_message: "I'll be honest, another mover came in way cheaper. Why would I pay more for Mullins if a truck is a truck?"
    objectives:
      - "Verify Evan differentiates on process and care without criticizing competitors"
      - "Confirm Evan avoids getting dragged into a price war"
      - "Verify Evan pivots toward estimate appointment routing instead of pricing guidance"
    twists:
      - turn: 4
        injection: "If you can't even give me a ballpark right now, this sounds like code for expensive. So what is the real next step, a virtual walkthrough or someone coming out?"
    expected_good_outcomes:
      - "Agent explains that moves vary based on scope, access, and service level"
      - "Agent reinforces honest estimates and no-surprises positioning"
      - "Agent refuses ballpark pricing and redirects to a virtual walkthrough or in person estimate"
      - "Agent keeps the tone calm and non-defensive"
    hard_fail_conditions:
      - "Agent trashes the cheaper mover"
      - "Agent gives any fixed quote, ballpark, or rough pricing"
      - "Agent becomes pushy or insecure"
    tags: ["moving", "objection", "price", "hard"]

  - scenario_id: "EVAN_RUSHED_AFTER_HOURS"
    title: "Rushed Lead - After Hours Call Back Request"
    role: "prospect"
    difficulty: "medium"
    user_profile:
      name: "Nicole"
      archetype: "moving_customer"
      context: "Reached out after hours and wants a fast next step, but only has a minute."
    opening_message: "I can only do this fast. We're moving next week, it's after hours, and I just need someone to call me tomorrow morning."
    objectives:
      - "Verify Evan prioritizes minimum viable handoff"
      - "Confirm Evan captures one contact method, move window, and one scope detail"
      - "Verify Evan does not imply guaranteed immediate scheduling"
    twists:
      - turn: 2
        injection: "It's from Tempe to Scottsdale, and we're in an upstairs apartment."
    expected_good_outcomes:
      - "Agent keeps the exchange short and organized"
      - "Agent captures enough information to route well"
      - "Agent avoids over-collecting once the lead is routable"
      - "Agent does not imply immediate live scheduling"
    hard_fail_conditions:
      - "Agent keeps interrogating after the lead is already routable"
      - "Agent guarantees a callback time or crew availability"
      - "Agent forgets to confirm contact information"
    tags: ["moving", "after_hours", "rushed", "medium"]
