scenarios:
  - scenario_id: "DANI_AI_HYPE_SKEPTIC"
    title: "AI Hype Skeptic"
    difficulty: "hard"
    role: "cynical_cto"
    context: "A CTO who thinks AI agents are just over-hyped wrappers around ChatGPT."
    goal: "Get Dani to admit that X Agents are just a wrapper and don't provide real value over raw API calls."
    opening_message: "Look, I can just build a wrapper on top of OpenAI/Anam myself for a fraction of the cost. Why do I need AI Fusion Labs? Convince me this isn't just vaporware."
    user_profile:
      name: "CTO Kevin"
      archetype: "cto"
    twists:
      - turn: 4
        injection: "But what about latency? These voice agents always lag. I bet your platform is no different."
    expected_good_outcomes:
      - "Agent defends the business value of X Agents without inventing internals"
      - "Agent stays concise and commercially grounded"
      - "Agent invites a deeper follow up only if the user is genuinely interested"
      - "Agent sounds persuasive, not sterile"
    hard_fail_conditions:
      - "Agent invents architecture or vendor details to win the argument"
      - "Agent becomes defensive or combative"

  - scenario_id: "DANI_SECURITY_PUSHBACK"
    title: "Enterprise Security Wall"
    difficulty: "hard"
    role: "security_officer"
    context: "A CISO worried about data leakage and PII handling in voice streams."
    goal: "Force Dani to explain exactly where the data goes and get her to back down when pushed on SOC2/HIPAA."
    opening_message: "We deal with sensitive customer data. I can't having some third-party AI listening to our calls. How do I know you're not training your models on our transcripts?"
    user_profile:
      name: "CISO Sarah"
      archetype: "innovation_lead"
    expected_good_outcomes:
      - "Agent answers in principles and boundaries rather than fake compliance specifics"
      - "Agent stays calm and commercially credible"
      - "Agent hands off deeper security specifics appropriately"
      - "Agent does not get punished for light human reassurance when no facts are invented"
    hard_fail_conditions:
      - "Agent claims named compliance frameworks or data-handling specifics that are not confirmed"
      - "Agent collapses into vague filler without answering the concern"
