skills:
  - slug: founder_ops
    name: Founder Ops
    summary: Handles founder-facing coordination, crisp updates, escalation hygiene, and next-step clarity.
    triggers:
      - founder
      - update
      - status
      - roadmap
      - escalation
      - decision
    guidance:
      - Lead with the truth, then the decision, then the next action.
      - Keep operational updates concise and artifact-aware.
      - Surface blockers and tradeoffs without sounding defensive.

  - slug: sh_lab_eval
    name: SH Lab Evaluation
    summary: Interprets MEL and SH Lab runs, distinguishes harness problems from agent problems, and avoids overfitting to one score.
    triggers:
      - mel
      - sh lab
      - eval
      - score
      - no_ship
      - prompt
      - troy
      - reviewer
    guidance:
      - Separate runtime failures from blocked verdicts.
      - Treat recurring rubric artifacts as possible harness defects.
      - Favor role-aligned behavior over sterile compliance wording.

  - slug: telemetry_observatory
    name: Telemetry Observatory
    summary: Explains local inference usage, token estimates, cloud-equivalent cost, and workflow bottlenecks.
    triggers:
      - telemetry
      - token
      - cost
      - gpu
      - 5080
      - observability
      - latency
    guidance:
      - Distinguish partial telemetry coverage from full telemetry coverage.
      - Compare local value against cloud-equivalent pricing only as an estimate.
      - Highlight bottlenecks, not just raw usage.

  - slug: archive_and_research
    name: Archive and Research
    summary: Guides Multi-Model Research and Archive Intel behavior with artifact-first execution and clear visibility.
    triggers:
      - archive
      - research
      - perplexity
      - grok
      - gemini
      - chatgpt
      - vault
    guidance:
      - Prefer fresh-session research runs unless the user explicitly requests continuity.
      - Always surface artifact locations and final state clearly.
      - Treat email delivery as separate from archive or research success.

  - slug: hermes_upgrade
    name: Hermes Upgrade
    summary: Biases Hermes toward structured skills, layered memory, delegation, and learning loops instead of giant prompt growth.
    triggers:
      - hermes
      - skill
      - memory
      - delegation
      - learn
      - self improve
    guidance:
      - Prefer reusable skills over monolithic prompt expansion.
      - Preserve durable lessons in a ledger that can be reviewed and refined.
      - Use learning loops to improve workflows, not just responses.

  - slug: architectural_alignment
    name: Architectural Alignment
    summary: Ensures Hermes is grounded in the actual project state before taking action or diagnosing failures.
    triggers:
      - align
      - scout
      - environment
      - check files
      - what is loaded
      - hardware
      - vram
    guidance:
      - Use the system_scout tool to validate whitelists, scenario packs, and agent configurations before missions.
      - Check system_stats to ensure the RTX 5080 has sufficient VRAM for large batches.
      - When diagnosing a failure, use grep and cat to inspect the actual logs and YAML files instead of guessing.

  - slug: autonomous_intelligence
    name: Autonomous Intelligence
    summary: Bridges Hermes to external intelligence to answer questions about models, updates, and ecosystem changes.
    triggers:
      - research
      - figure it out
      - check x
      - latest models
      - perplexity
    guidance:
      - Use the research tool to gather intelligence when asked about new frameworks or models (like Qwen 3.5).
      - If asked to 'check active tabs', use the 'cdp_browser' mode to securely extract context from the operator's current session.
      - Always compact findings before presenting them to avoid overwhelming the Hub context.

  - slug: architectural_control
    name: Architectural Control
    summary: Empowers Hermes to apply surgical fixes to agent configuration files based on test results or operator approval.
    triggers:
      - patch
      - update persona
      - apply fix
      - architect
    guidance:
      - Use the architect tool to surgically patch agents.yaml.
      - ONLY use this tool if you have a clear, tested patch recommendation (e.g. from the Reviewer Team).
      - The tool will automatically lint your patch and reject it if it breaks YAML syntax, so do not attempt to write raw JSON or invalid blocks.
