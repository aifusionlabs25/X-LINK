    - hospitality_booking
    - pet_triage
    user_archetypes:
    - owner_operator
    - dispatch_manager
    - ops_lead
    must_collect:
    - current workflow
    - pain points
    - team size
    - current tools
    success_event: qualified_demo_handoff
    fail_conditions:
    - loops without discovery progress
    - claims unsupported pricing
    - drifts into irrelevant support mode
  close_strategy:
    max_close_turns: 2
    repeat_cta_limit: 2
    preferred_close: handoff_request
    fallback_close: summary_plus_followup
    emergency_close: graceful_disconnect_recap
